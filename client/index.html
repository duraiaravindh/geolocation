<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Population Within Radius — U.S. Census</title>

    <!-- Tailwind via CDN keeps the POC build config-free -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Permanent AADT / road-name labels on traffic markers -->
    <style>
      .aadt-label {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        padding: 1px 5px;
        font: 600 10px/1.25 system-ui, sans-serif;
        color: #1e293b;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
        white-space: nowrap;
        text-align: center;
      }
      .aadt-label::before { display: none; } /* hide the tooltip arrow */
    </style>
  </head>
  <body class="bg-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
